<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gérer les Galerie - Admin AD Niamey 2000</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.min.css">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; animation: fadeIn 0.2s; }
    .modal-overlay.hidden { display: none; }
    .modal-box { background: var(--white); border-radius: 0.75rem; max-width: 640px; width: 100%; padding: 1.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.15); animation: slideUp 0.25s; }
    .modal-box h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.25rem; color: var(--gray-800); }
    .modal-box .form-group { margin-bottom: 0.75rem; }
    .modal-box .form-group label { font-size: 0.8rem; font-weight: 500; color: var(--gray-600); display: block; margin-bottom: 0.25rem; }
    .modal-box .form-group input, .modal-box .form-group select, .modal-box .form-group textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-300); border-radius: 0.375rem; font-size: 0.875rem; font-family: inherit; box-sizing: border-box; }
    .modal-box .form-group textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }
    .modal-actions .btn { padding: 0.5rem 1.25rem; font-size: 0.875rem; }
    .lang-tabs { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 2px solid var(--gray-200); }
    .lang-tabs button { padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 500; border: none; background: none; cursor: pointer; color: var(--gray-500); border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .lang-tabs button.active { color: var(--blue-700); border-bottom-color: var(--blue-600); }
    .lang-group { display: none; }
    .lang-group.active { display: block; }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo"><svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 10 L60 40 L90 40 L65 60 L75 90 L50 70 L25 90 L35 60 L10 40 L40 40 Z"/></svg><span>AD Admin</span></div>
    <nav class="admin-nav">
      <a href="index.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>Dashboard</span></a>
      <a href="evenements.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Événements</span></a>
      <a href="galerie.html" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Galerie</span></a>
      <a href="site.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>Contenu Site</span></a>
    </nav>
    <div class="admin-user"><div class="avatar">A</div><div><div class="name">Admin</div><div class="role">Administrateur</div></div></div>
  </aside>
  <div class="admin-main">
    <header class="admin-header">
      <h1>Galerie</h1>
      <div class="actions">
        <button class="btn btn-primary" onclick="openModal()" style="padding:0.4rem 1rem;font-size:0.85rem">+ Nouveau</button>
        <a href="../index.html" style="font-size:.85rem;color:var(--gray-500);margin-left:0.75rem">← Voir le site</a>
      </div>
    </header>
    <div class="admin-content">
      <div class="admin-table">
        <table>
          <thead><tr><th>ID</th><th>Titre</th><th>Date</th><th>Statut</th><th></th></tr></thead>
          <tbody id="table-body"><tr><td colspan="5" style="text-align:center;color:var(--gray-400)">Chargement...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modal-title">Nouveau Photo</h2>
    <div class="lang-tabs">
      <button class="active" onclick="switchLang(this,'fr')">FR</button>
      <button onclick="switchLang(this,'en')">EN</button>
      <button onclick="switchLang(this,'ha')">HA</button>
    </div>
    <form id="modal-form" onsubmit="saveItem(event)">
      <div id="lang-fr" class="lang-group active">
        <div class="form-group"><label>Légende (FR)</label><input type="text" id="field-caption_fr" required></div>
      </div>
      <div id="lang-en" class="lang-group">
        <div class="form-group"><label>Caption (EN)</label><input type="text" id="field-caption_en" required></div>
      </div>
      <div id="lang-ha" class="lang-group">
        <div class="form-group"><label>Labari (HA)</label><input type="text" id="field-caption_ha" required></div>
      </div>
      <div class="form-group"><label>Catégorie</label><select id="field-category" required><option value="culte">culte</option><option value="evenement">evenement</option><option value="jeunesse">jeunesse</option><option value="bapteme">bapteme</option><option value="mission">mission</option></select></div>
        <div class="form-group"><label>Gradient (ex: from-blue-500 to-purple-600)</label><input type="text" id="field-gradient" required></div>
        <div class="form-group"><label>Date</label><input type="date" id="field-date" required></div>
      <div class="modal-actions">
        <button type="button" class="btn" onclick="closeModal()" style="background:var(--gray-100);color:var(--gray-700)">Annuler</button>
        <button type="submit" class="btn btn-primary" id="modal-save-btn">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="../js/api.js"></script>
<script>
var token = sessionStorage.getItem("admin_token");
if (!token) { window.location = "login.html"; }
var apiType = "gallery";
var apiMethod = "getGallery";
var editingId = null;

function renderTable(data) {
  var tbody = document.getElementById("table-body");
  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td colspan=\"5\" style=\"text-align:center;color:var(--gray-400)\"Aucune donnée</td></tr>";
    return;
  }
  tbody.innerHTML = data.map(function(item) {
    var title = item.title_fr || item.caption_fr || "-";
    var date = item.date || "-";
    var status = item.status || "-";
    return "<tr><td>" + item.id + "</td><td>" + title + "</td><td>" + date + "</td><td>" + status + "</td><td class=\"actions-cell\"><button onclick=\"editItem(" + item.id + ")\" title=\"Modifier\" style=\"background:none;border:none;cursor:pointer;color:var(--blue-600);margin-right:0.5rem\">✏️</button><button onclick=\"deleteItem(" + item.id + ")\" title=\"Supprimer\">🗑️</button></td></tr>";
  }).join("");
}

function loadData() {
  window.api[apiMethod]().then(function(data) { renderTable(data); });
}

function openModal(data) {
  editingId = data ? data.id : null;
  document.getElementById("modal-title").textContent = data ? "Modifier Photo" : "Nouveau Photo";
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal-save-btn").textContent = data ? "Mettre à jour" : "Enregistrer";
  populateForm(data);
  switchLang(document.querySelector(".lang-tabs button"), "fr");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  editingId = null;
}

function switchLang(btn, lang) {
  document.querySelectorAll(".lang-tabs button").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  document.querySelectorAll(".lang-group").forEach(function(g) { g.classList.remove("active"); });
  document.getElementById("lang-" + lang).classList.add("active");
}

function getFormData() {
  var data = {};
  var fields = document.querySelectorAll("#modal-form [id^=\"field-\"]");
  fields.forEach(function(f) {
    data[f.id.replace("field-", "")] = f.value;
  });
  if (editingId) data.id = editingId;
  return data;
}

function populateForm(data) {
  var fields = document.querySelectorAll("#modal-form [id^=\"field-\"]");
  fields.forEach(function(f) {
    var key = f.id.replace("field-", "");
    f.value = data && data[key] != null ? data[key] : "";
  });
}

function saveItem(e) {
  e.preventDefault();
  var data = getFormData();
  var method = editingId ? "PUT" : "POST";
  var url = window.api.API_URL + "/" + apiType + (editingId ? "/" + editingId : "");
  document.getElementById("modal-save-btn").disabled = true;
  document.getElementById("modal-save-btn").textContent = "Enregistrement...";
  fetch(url, {
    method: method,
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
    body: JSON.stringify(data)
  }).then(function(r) {
    document.getElementById("modal-save-btn").disabled = false;
    document.getElementById("modal-save-btn").textContent = editingId ? "Mettre à jour" : "Enregistrer";
    if (r.ok) {
      closeModal();
      loadData();
    } else {
      r.json().then(function(err) { alert("Erreur : " + (err.error || "Requête invalide")); });
    }
  }).catch(function(e) {
    document.getElementById("modal-save-btn").disabled = false;
    document.getElementById("modal-save-btn").textContent = editingId ? "Mettre à jour" : "Enregistrer";
    alert("Erreur réseau");
  });
}

function editItem(id) {
  fetch(window.api.API_URL + "/" + apiType + "/" + id, {
    headers: { "Authorization": "Bearer " + token }
  }).then(function(r) { return r.json(); }).then(function(data) {
    openModal(data);
  }).catch(function(e) { console.warn("Fetch item failed", e); });
}

function deleteItem(id) {
  if (!confirm("Supprimer cet élément ?")) return;
  fetch(window.api.API_URL + "/" + apiType + "/" + id, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + token }
  }).then(function(r) { if (r.ok) loadData(); }).catch(function(e) { console.warn("Delete failed", e); });
}

loadData();
document.addEventListener("dataChanged", function(e) {
  if (!e.detail || e.detail.type === apiType) loadData();
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
