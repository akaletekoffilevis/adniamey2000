<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin - AD Niamey 2000</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="admin-login">
  <div class="admin-login-box">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 10 L60 40 L90 40 L65 60 L75 90 L50 70 L25 90 L35 60 L10 40 L40 40 Z"/></svg>
      <h1>AD Niamey 2000</h1>
      <p>Administration</p>
    </div>
    <form onsubmit="event.preventDefault();window.location='index.html'">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@adniamey2000.org" required>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Se connecter</button>
      <p style="text-align:center;margin-top:1rem;font-size:.8rem;color:var(--gray-500)"><a href="../index.html" style="color:var(--blue-700)">← Retour au site</a></p>
    </form>
  </div>
</div>
</body>
</html>
