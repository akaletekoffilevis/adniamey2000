<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Overlay - AD Niamey 2000</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .admin-login { width: 100%; max-width: 360px; padding: 1rem; }
    .admin-login-box { background: #fff; border-radius: 1rem; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo svg { width: 2.5rem; height: 2.5rem; color: #1e3a8a; }
    .logo h1 { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #1e3a8a; margin-top: 0.5rem; }
    .logo p { font-size: 0.8rem; color: #6b7280; margin-top: 0.125rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.3rem; }
    .form-group input { width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.9rem; }
    .form-group input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .error-msg { color: #dc2626; font-size: 0.85rem; text-align: center; display: none; margin-bottom: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; text-decoration: none; }
    .btn-primary { background: #1d4ed8; color: #fff; width: 100%; justify-content: center; }
    .btn-primary:hover { background: #1e40af; }
    .back-link { text-align: center; margin-top: 1rem; font-size: 0.8rem; color: #6b7280; }
    .back-link a { color: #1d4ed8; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="admin-login">
  <div class="admin-login-box">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 10 L60 40 L90 40 L65 60 L75 90 L50 70 L25 90 L35 60 L10 40 L40 40 Z"/></svg>
      <h1>AD Niamey 2000</h1>
      <p>Accès Administrateur</p>
    </div>
    <form onsubmit="event.preventDefault();var e=document.getElementById('email'),p=document.getElementById('password'),msg=document.getElementById('login-error');if(!e.value.includes('@')||!e.value.includes('.')){msg.textContent='Email invalide';msg.style.display='block';return}if(p.value.length<6){msg.textContent='Mot de passe incorrect (min. 6 caractères)';msg.style.display='block';return}sessionStorage.setItem('admin_logged','true');window.location='admin/login.html'">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@adniamey2000.org" required>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <p id="login-error" class="error-msg"></p>
      <button type="submit" class="btn btn-primary">Se connecter</button>
      <p class="back-link"><a href="index.html">← Retour au site</a></p>
    </form>
  </div>
</div>
</body>
</html>
