<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - AD Niamey 2000</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">

  <link rel="stylesheet" href="../css/style.min.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo"><svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 10 L60 40 L90 40 L65 60 L75 90 L50 70 L25 90 L35 60 L10 40 L40 40 Z"/></svg><span>AD Admin</span></div>
    <nav class="admin-nav">
      <a href="index.html" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>Dashboard</span></a>
      <a href="evenements.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Événements</span></a>
      <a href="galerie.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Galerie</span></a>
      <a href="site.html"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>Contenu Site</span></a>
    </nav>
    <div class="admin-user">
      <div class="avatar">A</div>
      <div><div class="name">Admin</div><div class="role">Administrateur</div></div>
      <button onclick="sessionStorage.removeItem('admin_token');window.location='login.html'" style="margin-top:0.75rem;padding:0.4rem 0.75rem;font-size:0.8rem;background:none;border:1px solid var(--red-400);color:var(--red-600);border-radius:0.375rem;cursor:pointer">Déconnexion</button>
    </div>
  </aside>
  <div class="admin-main">
    <header class="admin-header">
      <h1>Dashboard</h1>
      <div class="actions"><a href="../index.html" style="font-size:.85rem;color:var(--gray-500)">→ Voir le site</a></div>
    </header>
    <div class="admin-content">
      <div class="admin-stats" id="stats">
        <div class="admin-stat"><div class="icon orange"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1.25rem;height:1.25rem"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div><div class="num" id="stat-events">-</div><div class="label">Événements</div></div>
        <div class="admin-stat"><div class="icon purple"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1.25rem;height:1.25rem"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div><div class="num" id="stat-gallery">-</div><div class="label">Photos</div></div>
      </div>
      <div class="admin-table">
        <table>
          <thead><tr><th>Titre</th><th>Type</th><th>Date</th><th></th></tr></thead>
          <tbody id="recent-list"><tr><td colspan="4" style="text-align:center;color:var(--gray-400)">Chargement...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="../js/api.js"></script>
<script>
var token = sessionStorage.getItem("admin_token");
if (!token) { window.location = "login.html"; }
var types = [["events","getEvents","stat-events"],["gallery","getGallery","stat-gallery"]];
function loadStats() {
  types.forEach(function(t) {
    window.api[t[1]]().then(function(data) {
      document.getElementById(t[2]).textContent = data.length;
    });
  });
  var recent = [];
  window.api.getEvents().then(function(d) { d.forEach(function(x) { recent.push({title:x.title_fr,type:"Événement",date:x.date}); }); renderRecent(); });
}
function renderRecent() {
  var list = document.getElementById("recent-list");
  recent.sort(function(a,b) { return a.date < b.date ? 1 : -1; });
  list.innerHTML = recent.slice(0,10).map(function(x) {
    return "<tr><td>" + x.title + "</td><td>" + x.type + "</td><td>" + x.date + "</td><td class=\"actions-cell\"></td></tr>";
  }).join("");
}
loadStats();
document.addEventListener("dataChanged", function() { loadStats(); });
</script>
</body>
</html>
