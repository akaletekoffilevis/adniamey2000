<body data-page="gallery">

<div data-component="navbar" data-src="components/navbar.html"></div>

<main>
  <section class="hero hero-page" aria-label="Galerie">
    <div class="hero-bg" aria-hidden="true">
      <svg viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
        <circle cx="600" cy="300" r="300" fill="white"/><circle cx="100" cy="600" r="200" fill="white"/>
      </svg>
    </div>
    <div class="hero-content">
      <h1 class="hero-title" data-i18n="hero.gallery.title">Galerie Photos &amp; Vidéos</h1>
      <p class="hero-subtitle" data-i18n="hero.gallery.subtitle">Découvrez en images les moments forts de notre vie d'église.</p>
    </div>
  </section>

  <section class="section" aria-label="Galerie">
    <div class="container">
      <div class="tab-group">
        <button class="tab-btn active" data-tab="photos-tab" data-i18n="gallery.photos">Photos</button>
        <button class="tab-btn" data-tab="videos-tab" data-i18n="gallery.videos">Vidéos</button>
      </div>

      <div class="tab-panel active" id="photos-tab">
        <div class="filter-group" style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap">
          <button class="filter-btn active" data-filter="all" data-i18n="gallery.filter.all">Toutes</button>
          <button class="filter-btn" data-filter="cultes" data-i18n="gallery.filter.cultes">Cultes</button>
          <button class="filter-btn" data-filter="jeunesse" data-i18n="gallery.filter.jeunesse">Jeunesse</button>
          <button class="filter-btn" data-filter="baptemes" data-i18n="gallery.filter.baptemes">Baptêmes</button>
          <button class="filter-btn" data-filter="evenements" data-i18n="gallery.filter.evenements">Événements</button>
        </div>
        <div class="grid-gallery" data-content="gallery-grid"></div>
      </div>

      <div class="tab-panel" id="videos-tab">
        <div class="video-grid" id="videos-grid"></div>
      </div>
    </div>
  </section>
</main>
